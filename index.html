<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生達藥事會議紀錄系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; }
        .markdown-body { line-height: 1.8; color: #334155; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; }
        .markdown-body th, .markdown-body td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [theme, setTheme] = useState("");
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [companyName, setCompanyName] = useState("Standard Chem & Pharm Co., Ltd.");
            const [reports, setReports] = useState([{ id: Date.now(), name: "", content: "", files: [] }]);
            const [summary, setSummary] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);

            const handleFileUpload = async (e, reportId) => {
                const files = Array.from(e.target.files);
                const processedFiles = await Promise.all(files.map(async file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    return new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            if (ext === 'pdf') {
                                resolve({ id: Math.random(), name: file.name, type: 'inline', mimeType: 'application/pdf', data: event.target.result.split(',')[1] });
                            } else {
                                resolve({ id: Math.random(), name: file.name, type: 'text', data: "已讀取附件：" + file.name });
                            }
                        };
                        ext === 'pdf' ? reader.readAsDataURL(file) : reader.readAsText(file);
                    });
                }));
                setReports(reports.map(r => r.id === reportId ? {...r, files: [...(r.files || []), ...processedFiles]} : r));
            };

            const handleGenerateSummary = async () => {
                const apiKey = prompt("請貼入 Gemini API Key (請確保無空格):");
                if (!apiKey) return;
                setIsGenerating(true);
                setSummary("");

                try {
                    // 修正關鍵：改用 v1 路徑並確保參數正確
                    const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ 
                                parts: [{ text: `你是一位藥廠特助。請根據以下 ${companyName} 的內容整理為一份正式公文：\n主題：${theme}\n日期：${date}\n內容詳情：${JSON.stringify(reports)}` }] 
                            }] 
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    if (data.candidates && data.candidates[0].content) {
                        setSummary(data.candidates[0].content.parts[0].text);
                    } else {
                        throw new Error("回傳內容異常，請稍後再試。");
                    }
                } catch (e) {
                    alert("系統診斷回報：\n" + e.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="mb-8 text-center text-blue-900">
                        <h1 className="text-3xl font-bold">藥事會議紀錄彙整系統 v2.0</h1>
                        <p className="text-slate-500 mt-2">生達化學製藥專用版本</p>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <aside className="lg:col-span-5 space-y-6">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <label className="block text-sm font-bold mb-1">發文單位</label>
                                <input value={companyName} onChange={e => setCompanyName(e.target.value)} className="w-full p-2 border rounded mb-4 focus:ring-2 focus:ring-blue-500 outline-none" />
                                <label className="block text-sm font-bold mb-1">會議主題</label>
                                <input value={theme} onChange={e => setTheme(e.target.value)} placeholder="如：營二月中會
