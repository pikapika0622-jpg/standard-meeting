<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生達化學製藥 - 會議紀錄自動化系統</title>
    <!-- 載入外部資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 載入 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 16px 0; background: white; }
        .markdown-body th, .markdown-body td { border: 1px solid #cbd5e1; padding: 12px; text-align: left; font-size: 14px; }
        .markdown-body th { background-color: #f8fafc; font-weight: bold; }
        .markdown-body h1, .markdown-body h2 { font-weight: bold; color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-top: 24px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [location, setLocation] = useState("北區辦事處");
            const [recorder, setRecorder] = useState("");
            const [attendees, setAttendees] = useState("");
            const [theme, setTheme] = useState("1. 114年進藥進度追蹤\n2. 114年增量進度分析\n3. Vidatin、Sigtamet進藥規劃\n4. 競爭品KB、Ogivri、Fulphila市場訊息回饋");
            const [reports, setReports] = useState([{ id: Date.now(), group: "", name: "", content: "", files: [] }]);
            const [aiResult, setAiResult] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);

            const quickAttendees = ["王煌傑", "許兆欽", "程宜珮"];
            const apiKey = ""; // 執行環境將自動處理金鑰

            const addAttendee = (name) => {
                if (!attendees) setAttendees(name);
                else if (!attendees.includes(name)) setAttendees(prev => `${prev}、${name}`);
            };

            const handleFileChange = (e, reportId) => {
                const fileNames = Array.from(e.target.files).map(f => f.name);
                setReports(reports.map(r => r.id === reportId ? { ...r, files: [...(r.files || []), ...fileNames] } : r));
            };

            const generateMinutes = async () => {
                if (!theme || !attendees) {
                    alert("請完整填寫會議基本資訊！");
                    return;
                }
                setIsGenerating(true);
                setAiResult("");

                const systemPrompt = `你是一位專業的藥廠特助，任職於 Standard Chem & Pharm Co., Ltd. (生達化學製藥)。
請根據提供的數據撰寫一份「標準會議紀錄」(非公文格式)。

【撰寫格式規範】：
1. 階層樣式：內文須符合 一、(一) 1. (1.) 順序。
2. 主題彙整：請務必以「會議討論主題」作為分類大綱進行歸納。
3. 表格化：在每個主題下，將相關業務員的回報內容整理成 Markdown 表格。
   表格欄位：| 業務人員 | 醫院名稱 | 藥品品項 | 進度/數據/現況回報 | 附件名稱 |
4. 專業性：使用藥業專業用語，針對 Ogivri/Fulphila/Bistin 等品項進行精確彙整。
5. 排除項目：不要出現發文字號、速別或正式公文抬頭。`;

                const userQuery = `會議資料：
日期：${date} | 地點：${location} | 紀錄：${recorder} | 與會：${attendees}
主題：${theme}
業務報告：${JSON.stringify(reports)}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    setAiResult(data.candidates?.[0]?.content?.parts?.[0]?.text || "生成失敗，請再試一次。");
                } catch (e) {
                    alert("系統連線異常，請檢查網路。");
                } finally {
                    setIsGenerating(true); // 修正狀態
                    setIsGenerating(false);
                }
            };

            const exportWord = () => {
                const html = marked.parse(aiResult);
                const template = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head><meta charset='utf-8'><style>
                        body { font-family: "標楷體", serif; padding: 40px; }
                        table { border-collapse: collapse; width: 100%; border: 1px solid black; }
                        th, td { border: 1px solid black; padding: 8px; font-size: 11pt; }
                        .title { text-align: center; color: #cc0000; font-size: 22pt; font-weight: bold; border-bottom: 2px solid red; }
                    </style></head>
                    <body>
                        <div class="title">生達化學製藥股份有限公司 會議紀錄</div>
                        <p>日期：${date} | 地點：${location} | 記錄人：${recorder}</p>
                        <p>與會人員：${attendees}</p>
                        <hr>${html}
                    </body></html>`;
                const blob = new Blob([template], { type: 'application/msword' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `生達會議紀錄_${date}.doc`;
                link.click();
            };

            return (
                <div className="min-h-screen p-4 lg:p-10">
                    <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* 左側輸入區 */}
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white rounded-3xl shadow-xl p-8 border border-slate-200">
                                <h2 className="text-xl font-black text-blue-900 mb-6 flex items-center gap-2 italic">
                                    Standard Chem Minutes System
                                </h2>
                                
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                    <input type="date" value={date} onChange={e => setDate(e.target.value)} className="p-3 bg-slate-50 border rounded-xl text-sm font-bold w-full" />
                                    <input value={location} onChange={e => setLocation(e.target.value)} placeholder="地點" className="p-3 bg-slate-50 border rounded-xl text-sm w-full" />
                                </div>
                                
                                <input value={recorder} onChange={e => setRecorder(e.target.value)} placeholder="記錄人員" className="w-full p-3 bg-slate-50 border rounded-xl text-sm mb-4" />
                                
                                <div className="mb-4">
                                    <label className="text-[10px] font-black text-slate-400 uppercase">與會人員</label>
                                    <input value={attendees} onChange={e => setAttendees(e.target.value)} placeholder="手動輸入或點擊下方快捷鍵" className="w-full p-3 bg-slate-50 border rounded-xl text-sm mt-1" />
                                    <div className="flex gap-2 mt-2">
                                        {quickAttendees.map(name => (
                                            <button key={name} onClick={() => addAttendee(name)} className="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-bold border border-blue-100">+ {name}</button>
                                        ))}
                                    </div>
                                </div>

                                <div className="mb-6">
                                    <label className="text-[10px] font-black text-slate-400 uppercase">討論主題 (Theme)</label>
                                    <textarea value={theme} onChange={e => setTheme(e.target.value)} className="w-full h-32 p-3 border rounded-xl text-sm mt-1 resize-none bg-white" />
                                </div>

                                <div className="border-t pt-4">
                                    <div className="flex justify-between items-center mb-4 text-sm font-bold">
                                        <span>報告明細匯入</span>
                                        <button onClick={() => setReports([...reports, { id: Date.now(), group: "", name: "", content: "", files: [] }])} className="text-blue-600">+ 新增人員</button>
                                    </div>
                                    <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 no-scrollbar">
                                        {reports.map(r => (
                                            <div key={r.id} className="p-4 bg-slate-50 rounded-2xl border border-slate-100 relative">
                                                <div className="grid grid-cols-2 gap-2 mb-2">
                                                    <input placeholder="組別 (業一A)" value={r.group} onChange={e => setReports(reports.map(rep => rep.id === r.id ? {...rep, group: e.target.value} : rep))} className="p-2 text-xs border rounded bg-white" />
                                                    <input placeholder="姓名" value={r.name} onChange={e => setReports(reports.map(rep => rep.id === r.id ? {...rep, name: e.target.value} : rep))} className="p-2 text-xs border rounded bg-white font-bold" />
                                                </div>
                                                <label className="inline-block bg-white border border-slate-200 px-2 py-1 rounded text-[9px] font-bold cursor-pointer mb-2">
                                                    📎 附件上傳
                                                    <input type="file" multiple className="hidden" onChange={(e) => handleFileChange(e, r.id)} />
                                                </label>
                                                <span className="text-[9px] text-blue-500 ml-2 italic">{r.files?.length > 0 ? `${r.files.length} 檔案` : "無"}</span>
                                                <textarea placeholder="輸入該員報告細節..." value={r.content} onChange={e => setReports(reports.map(rep => rep.id === r.id ? {...rep, content: e.target.value} : rep))} className="w-full h-20 p-2 text-xs border rounded bg-white resize-none" />
                                                {reports.length > 1 && <button onClick={() => setReports(reports.filter(rep => rep.id !== r.id))} className="absolute top-1 right-1 text-slate-300 text-xs hover:text-red-500">✕</button>}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <button onClick={generateMinutes} disabled={isGenerating} className="w-full py-4 bg-slate-900 text-white font-black rounded-2xl shadow-xl mt-6 hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                                    {isGenerating ? "正在彙整主題數據..." : "🚀 啟動 AI 主題分類彙整"}
                                </button>
                            </div>
                        </div>

                        {/* 右側結果區 */}
                        <div className="lg:col-span-7 flex flex-col h-[850px]">
                            <div className="bg-white rounded-3xl shadow-xl border border-slate-200 flex flex-col h-full overflow-hidden">
                                <div className="px-8 py-4 bg-slate-50 border-b flex justify-between items-center">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Official Record Preview</span>
                                    <button onClick={exportWord} disabled={!aiResult} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-md transition-all">
                                        匯出正式 Word
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-10 bg-white no-scrollbar">
                                    {aiResult ? (
                                        <div className="markdown-body" dangerouslySetInnerHTML={{ __html: marked.parse(aiResult) }} />
                                    ) : (
                                        <div className="h-full flex items-center justify-center text-slate-200 italic font-bold">等待數據輸入並彙整...</div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
