<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥事公文級會議紀錄系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; }
        .markdown-body { line-height: 1.8; color: #334155; }
        .markdown-body h1 { font-size: 1.6rem; border-left: 6px solid #1e40af; padding-left: 12px; margin: 24px 0 16px; color: #1e3a8a; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; }
        .markdown-body th, .markdown-body td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; }
        .markdown-body th { background-color: #f1f5f9; font-weight: 600; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const IconSparkles = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>;

        const App = () => {
            const [theme, setTheme] = useState("");
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [companyName, setCompanyName] = useState("Standard Chem & Pharm Co., Ltd.");
            const [reports, setReports] = useState([{ id: Date.now(), name: "", content: "", files: [] }]);
            const [summary, setSummary] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);

            // 檔案上傳解析邏輯
            const handleFileUpload = async (e, reportId) => {
                const files = Array.from(e.target.files);
                const processedFiles = await Promise.all(files.map(async file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    return new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            if (ext === 'pdf') {
                                resolve({ id: Math.random(), name: file.name, type: 'inline', mimeType: 'application/pdf', data: event.target.result.split(',')[1] });
                            } else {
                                resolve({ id: Math.random(), name: file.name, type: 'text', data: "已讀取附件資料" });
                            }
                        };
                        ext === 'pdf' ? reader.readAsDataURL(file) : reader.readAsText(file);
                    });
                }));
                setReports(reports.map(r => r.id === reportId ? {...r, files: [...r.files, ...processedFiles]} : r));
            };

            const handleGenerateSummary = async () => {
                const apiKey = prompt("請輸入 Gemini API Key:");
                if (!apiKey) return;
                setIsGenerating(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `請幫我彙整以下 ${companyName} 的會議內容為正式公文：\n主題：${theme}\n日期：${date}\n內容：${JSON.stringify(reports)}` }] }] })
                    });
                    const data = await response.json();
                    setSummary(data.candidates[0].content.parts[0].text);
                } catch (e) { alert("錯誤：" + e.message); }
                finally { setIsGenerating(false); }
            };

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="mb-8 text-center">
                        <h1 className="text-3xl font-extrabold text-blue-900 mb-2">藥事會議紀錄彙整系統 v2.0</h1>
                        <p className="text-slate-500">標準公文排版 • 附件自動解析 • Gemini AI 驅動</p>
                    </header>
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <aside className="lg:col-span-5 space-y-6">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <label className="block text-sm font-semibold text-slate-700 mb-2">發文單位</label>
                                <input value={companyName} onChange={e => setCompanyName(e.target.value)} className="w-full p-2 border rounded-lg mb-4" />
                                <label className="block text-sm font-semibold text-slate-700 mb-2">會議主題</label>
                                <input value={theme} onChange={e => setTheme(e.target.value)} className="w-full p-2 border rounded-lg" />
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="font-bold text-slate-800">業務報告與附件</h2>
                                    <button onClick={() => setReports([...reports, { id: Date.now(), name: "", content: "", files: [] }])} className="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded-md">+ 新增業務</button>
                                </div>
                                {reports.map(r => (
                                    <div key={r.id} className="mb-4 p-4 bg-slate-50 rounded-xl border border-slate-100">
                                        <input placeholder="業務姓名" value={r.name} onChange={e => setReports(reports.map(rep => rep.id === r.id ? {...rep, name: e.target.value} : rep))} className="w-full mb-2 p-1 border rounded" />
                                        <input type="file" multiple onChange={e => handleFileUpload(e, r.id)} className="text-[10px] mb-2" />
                                        <textarea placeholder="補充內容..." value={r.content} onChange={e => setReports(reports.map(rep => rep.id === r.id ? {...rep, content: e.target.value} : rep))} className="w-full h-20 p-2 text-xs border rounded" />
                                    </div>
                                ))}
                            </div>
                            <button onClick={handleGenerateSummary} disabled={isGenerating} className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg flex justify-center gap-2">
                                {isGenerating ? "處理中..." : <><IconSparkles /> 產生公文級紀錄</>}
                            </button>
                        </aside>
                        <main className="lg:col-span-7 bg-white rounded-2xl shadow-lg border p-8 overflow-y-auto h-[600px]">
                            {summary ? <div className="markdown-body" dangerouslySetInnerHTML={{ __html: marked.parse(summary) }} /> : <p className="text-slate-300 text-center mt-20">等待生成結果...</p>}
                        </main>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
