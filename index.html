<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生達會議紀錄助手 - Word 匯出版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [location, setLocation] = useState("北區辦事處");
            const [attendees, setAttendees] = useState("");
            const [theme, setTheme] = useState("");
            const [reports, setReports] = useState([{ id: Date.now(), group: "", name: "", content: "", files: [] }]);

            const handleFileChange = (e, reportId) => {
                const fileNames = Array.from(e.target.files).map(f => f.name);
                setReports(reports.map(r => r.id === reportId ? {...r, files: [...(r.files || []), ...fileNames]} : r));
            };

            const handleCopyPrompt = () => {
                const dataString = reports.map(r => 
                    `【組別：${r.group} | 業務：${r.name}】\n報告內容：${r.content}`
                ).join('\n\n');
                
                const fullPrompt = `你是一位專業的藥廠特助。請根據以下資料，為 Standard Chem & Pharm Co., Ltd. (生達化學製藥) 撰寫一份「正式公文格式」的會議紀錄。

【基本參數】
日期：${date} | 地點：${location} | 與會人員：${attendees}
主題：${theme}

【原始數據內容】
${dataString}

【撰寫格式嚴格要求】
一、 內文階層樣式：請嚴格遵守 一、(一) 1. (1.) 之順序。
二、 會議內容彙整表格：請將所有業務報告內容彙整成一個 Markdown 表格，欄位必須包含：| 組別 | 業務名 | 藥品名 (如 Ogivri/Fulphila/Bistin) | 醫院名稱 | 進藥追蹤/增量分析進度 |。
三、 專業屬性：
    1. 包含：發文字號、速別（最速件）、密等（普通）。
    2. 內容：會議概述、上述之彙整表格、決議事項、待辦清單。
    3. 用語：須莊重專業，精確彙整藥廠業務專用術語。`;

                navigator.clipboard.writeText(fullPrompt).then(() => {
                    alert("✅ 會議資料已打包！\n請至 Gemini 貼上，產出後將內容貼回右側即可匯出 Word。");
                });
            };

            const [aiResult, setAiResult] = useState("");

            const exportToWord = () => {
                const docTemplate = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head><meta charset='utf-8'><style>
                        body { font-family: "標楷體", serif; padding: 20pt; }
                        table { border-collapse: collapse; width: 100%; }
                        th, td { border: 1px solid black; padding: 5pt; font-size: 11pt; }
                        h1 { text-align: center; color: red; font-size: 24pt; }
                    </style></head>
                    <body>
                        <h1>Standard Chem & Pharm Co., Ltd.</h1>
                        <h2 style="text-align:center">會議紀錄簽報</h2>
                        <p>日期：${date} | 地點：${location}</p>
                        <p>與會人員：${attendees}</p>
                        <hr>
                        <div>${aiResult.replace(/\n/g, '<br>')}</div>
                    </body></html>`;
                const blob = new Blob([docTemplate], { type: 'application/msword' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `生達會議紀錄_${theme}.doc`;
                link.click();
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:py-10">
                    <header className="mb-8 text-center">
                        <h1 className="text-3xl font-black text-blue-900 italic">Standard Chem 會議紀錄彙整系統</h1>
                        <p className="text-slate-500 mt-2 font-bold">Word 匯出 & 階層格式優化版 (v2.4)</p>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        {/* 左側輸入區 */}
                        <div className="bg-white rounded-3xl shadow-xl p-6 space-y-4 border border-slate-200">
                            <div className="grid grid-cols-2 gap-4">
                                <input type="date" value={date} onChange={e => setDate(e.target.value)} className="p-2 border rounded-lg bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" />
                                <input value={location} onChange={e => setLocation(e.target.value)} placeholder="會議地點" className="p-2 border rounded-lg bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <input value={attendees} onChange={e => setAttendees(e.target.value)} placeholder="與會人員 (王煌傑、許兆欽...)" className="w-full p-2 border rounded-lg bg-slate-50 outline-none" />
                            <textarea value={theme} onChange={e => setTheme(e.target.value)} placeholder="會議主題 (1. 114年進藥追蹤...)" className="w-full h-20 p-2 border rounded-lg bg-white outline-none resize-none" />
                            
                            <div className="flex justify-between items-center border-t pt-4">
                                <h2 className="font-black text-slate-800">業務報告數據彙整</h2>
                                <button onClick={() => setReports([...reports, { id: Date.now(), group: "", name: "", content: "", files: [] }])} className="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-bold">+ 新增人員</button>
                            </div>

                            <div className="space-y-4 max-h-[350px] overflow-y-auto pr-2 no-scrollbar">
                                {reports.map((r) => (
                                    <div key={r.id} className="p-4 bg-slate-50 rounded-xl border border-slate-200 relative">
                                        <div className="grid grid-cols-2 gap-2 mb-2">
                                            <input placeholder="組別 (如: 營二部)" value={r.group} onChange={e => setReports(reports.map(rep => rep.id === r.id ? {...rep, group: e.target.value} : rep))} className="p-1.5 text-xs border rounded bg-white" />
                                            <input placeholder="業務姓名" value={r.name} onChange={e => setReports(reports.map(rep => rep.id === r.id ? {...rep, name: e.target.value} : rep))} className="p-1.5 text-xs border rounded bg-white font-bold" />
                                        </div>
                                        <textarea placeholder="報告細節 (包含藥品名、醫院名、進度...)" value={r.content} onChange={e => setReports(reports.map(rep => rep.id === r.id ? {...rep, content: e.target.value} : rep))} className="w-full h-20 p-2 text-xs border rounded bg-white resize-none" />
                                        {reports.length > 1 && <button onClick={() => setReports(reports.filter(rep => rep.id !== r.id))} className="absolute top-2 right-2 text-slate-300 hover:text-red-500">✕</button>}
                                    </div>
                                ))}
                            </div>

                            <button onClick={handleCopyPrompt} className="w-full py-4 bg-blue-800 text-white font-black rounded-xl shadow-lg hover:bg-blue-900 transition flex items-center justify-center gap-2">🚀 打包複製 AI 指令</button>
                        </div>

                        {/* 右側 Word 匯出區 */}
                        <div className="bg-white rounded-3xl shadow-xl p-6 border border-slate-200 flex flex-col h-[650px]">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="font-black text-slate-800 italic">Word 產出預覽</h2>
                                <button onClick={exportToWord} disabled={!aiResult} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-md disabled:opacity-50">一鍵產出 Word 文檔</button>
                            </div>
                            <textarea 
                                value={aiResult} 
                                onChange={e => setAiResult(e.target.value)} 
                                placeholder="請將 Gemini 產出的公文內容貼到這裡，然後點擊上方按鈕匯出 Word..." 
                                className="flex-1 w-full p-4 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 text-sm focus:border-blue-300 outline-none resize-none shadow-inner"
                            />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
