<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生達藥事會議紀錄助手 (免API版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [theme, setTheme] = useState("");
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [companyName, setCompanyName] = useState("Standard Chem & Pharm Co., Ltd.");
            const [reports, setReports] = useState([{ id: Date.now(), name: "", content: "" }]);

            const handleCopyPrompt = () => {
                if (!theme || reports[0].name === "") {
                    alert("請至少填寫會議主題與一位業務姓名！");
                    return;
                }

                const dataString = reports.map(r => `【業務：${r.name}】\n報告內容：${r.content}`).join('\n\n');
                
                const fullPrompt = `你是一位專業的藥廠特助。請根據以下資料，為 ${companyName} 撰寫一份正式的會議公文紀錄。

會議主題：${theme}
會議日期：${date}

詳細報告內容：
${dataString}

請務必包含以下公文格式：
1. 發文字號與速別（最速件）。
2. 會議概述（摘要重點）。
3. 業務執行概況表（請用 Markdown 表格呈現數據與進度）。
4. 決議事項與待辦清單 (Action Items)。
5. 用詞請莊重且專業，符合藥廠公文規範。`;

                navigator.clipboard.writeText(fullPrompt).then(() => {
                    alert("✅ 指令已打包並複製！\n請現在切換到 Gemini 視窗直接「貼上」即可。");
                });
            };

            return (
                <div className="max-w-4xl mx-auto p-6 md:p-12">
                    <header className="mb-10 text-center">
                        <h1 className="text-3xl font-extrabold text-blue-900">生達會議紀錄彙整工具</h1>
                        <p className="text-slate-500 mt-2">免 API 金鑰版 • 自動打包強效指令</p>
                    </header>

                    <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-8 space-y-8">
                        <section className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">發文單位</label>
                                <input value={companyName} onChange={e => setCompanyName(e.target.value)} className="w-full p-3 border rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">會議日期</label>
                                <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full p-3 border rounded-xl bg-slate-50 outline-none" />
                            </div>
                        </section>

                        <section>
                            <label className="block text-sm font-bold text-slate-700 mb-2">會議主題</label>
                            <input value={theme} onChange={e => setTheme(e.target.value)} placeholder="例如：營二月中會業績檢討" className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                        </section>

                        <section className="space-y-4">
                            <div className="flex justify-between items-center">
                                <h2 className="font-bold text-slate-800 text-lg">業務報告細項</h2>
                                <button onClick={() => setReports([...reports, { id: Date.now(), name: "", content: "" }])} className="text-sm text-blue-600 font-medium hover:underline">+ 新增彙整人員</button>
                            </div>
                            
                            <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 no-scrollbar">
                                {reports.map((r, index) => (
                                    <div key={r.id} className="p-5 bg-blue-50/50 rounded-2xl border border-blue-100 relative group">
                                        <input 
                                            placeholder="業務姓名 (如: Cindy)" 
                                            value={r.name} 
                                            onChange={e => setReports(reports.map(rep => rep.id === r.id ? {...rep, name: e.target.value} : rep))} 
                                            className="w-full mb-3 p-2 text-sm font-bold border-b bg-transparent border-blue-200 focus:border-blue-500 outline-none" 
                                        />
                                        <textarea 
                                            placeholder="請輸入或貼上該業務的報告重點、數據、或是會議發言..." 
                                            value={r.content} 
                                            onChange={e => setReports(reports.map(rep => rep.id === r.id ? {...rep, content: e.target.value} : rep))} 
                                            className="w-full h-32 p-3 text-sm bg-white rounded-xl border border-slate-200 resize-none focus:ring-1 focus:ring-blue-400 outline-none" 
                                        />
                                        {reports.length > 1 && (
                                            <button onClick={() => setReports(reports.filter(rep => rep.id !== r.id))} className="absolute top-4 right-4 text-slate-400 hover:text-red-500">✕</button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </section>

                        <button 
                            onClick={handleCopyPrompt}
                            className="w-full py-5 bg-gradient-to-r from-blue-700 to-indigo-800 text-white font-black text-xl rounded-2xl shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3"
                        >
                            <span>🚀 打包資料並複製 AI 指令</span>
                        </button>
                    </div>

                    <footer className="mt-8 text-center text-slate-400 text-sm italic">
                        點擊按鈕後，請至 Gemini 貼上，AI 將依據生達規範產出正式公文。
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
